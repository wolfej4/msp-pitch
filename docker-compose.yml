services:
  msp-pitch:
    build: .
    # Use this instead of build: when pulling from a registry:
    # image: ghcr.io/yourname/msp-pitch:latest
    container_name: msp-pitch
    ports:
      - "8080:8000"
    volumes:
      - ./data:/app/data
    environment:
      # ---- Branding ----
      COMPANY_NAME: "${COMPANY_NAME:-Wolfden IT}"
      COMPANY_TAGLINE: "${COMPANY_TAGLINE:-Managed IT Services}"
      COMPANY_EMAIL: "${COMPANY_EMAIL:-hello@example.com}"
      COMPANY_PHONE: "${COMPANY_PHONE:-}"
      COMPANY_WEBSITE: "${COMPANY_WEBSITE:-}"

      # ---- LLM ----
      # 'anthropic' or 'ollama'
      LLM_PROVIDER: "${LLM_PROVIDER:-ollama}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      ANTHROPIC_MODEL: "${ANTHROPIC_MODEL:-claude-sonnet-4-5}"
      OLLAMA_BASE_URL: "${OLLAMA_BASE_URL:-http://host.docker.internal:11434}"
      OLLAMA_MODEL: "${OLLAMA_MODEL:-llama3.1:8b}"

      # ---- SMTP (optional) ----
      SMTP_HOST: "${SMTP_HOST:-}"
      SMTP_PORT: "${SMTP_PORT:-587}"
      SMTP_USER: "${SMTP_USER:-}"
      SMTP_PASS: "${SMTP_PASS:-}"
      SMTP_FROM: "${SMTP_FROM:-}"
      SMTP_TLS: "${SMTP_TLS:-true}"

    extra_hosts:
      # Lets the container reach Ollama running on the Unraid host
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
